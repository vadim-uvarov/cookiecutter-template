name: Main pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: main-pipeline
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest

  commitizen-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      # Validate every commit message since the previous version tag.
      - name: Check commit messages
        run: |
          PREV_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            uv run cz check --rev-range "${PREV_TAG}..HEAD"
          else
            echo "No previous tag found; skipping range check."
          fi

  deploy-prod:
    needs: [lint, test, commitizen-check]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write  # for AWS OIDC (configure-aws-credentials)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      # Set the `prod` environment variables AWS_ROLE_ARN, AWS_REGION and
      # TF_STATE_BUCKET (the bucket printed by scripts/create-bucket-for-tfstate-in-aws.sh).
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (prod)
        run: |
          terraform -chdir=terraform/prod init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"
          terraform -chdir=terraform/prod apply -auto-approve -input=false
